<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f0f1a" />
  <title>404 | Super-mario11</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700;800&display=swap" rel="stylesheet" />
  <style>
    :root{--bg:#0f0f1a;--text:#eef2ff;--muted:#9fb1d8;--grad:linear-gradient(135deg,#6a5af9,#00d4ff)}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:Poppins,system-ui,sans-serif;background:radial-gradient(circle at 10% 20%,#1b1b35 0,#0f0f1a 45%,#0a0a12 100%);color:var(--text)}
    main{padding:2rem;text-align:center;width:min(92vw,620px);border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);border-radius:16px;backdrop-filter:blur(8px)}
    h1{font-size:clamp(2.2rem,8vw,4.5rem);margin:.2rem 0;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
    p{margin:.3rem 0 1.2rem;color:var(--muted)}
    a{display:inline-block;padding:.7rem 1rem;border-radius:12px;border:1px solid rgba(255,255,255,.2);color:var(--text);text-decoration:none}
  </style>
</head>
<body>
  <main>
    <h1>404</h1>
    <p>This route drifted into deep space.</p>
    <a href="/">Return to Portfolio</a>
  </main>
</body>
</html>
